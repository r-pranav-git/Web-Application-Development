<!DOCTYPE html>
<html>
<head>
    <title>Company Blog - Comment Form</title>

    <!-- Internal CSS -->
    <style>
        body {
            font-family: Arial, sans-serif;
            background:#75d8df;
        }

        h1 {
            text-align: center;
            color: darkblue;
        }

        .form-container {
            width: 400px;
            margin: auto;
            background-color: white;
            padding: 20px;
            border-radius: 10px;
        }

        label {
            font-weight: bold;
        }
    </style>

    <!-- External CSS -->
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <!-- Inline CSS -->
    <h1 style="margin-top:20px;">Leave a Comment</h1>

    <div class="form-container">

        <form action="success.html">

            <label>Name:</label><br>
            <input type="text" name="name" class="input-field" required><br><br>

            <label>Email:</label><br>
            <input type="email" name="email" class="input-field" required><br><br>

            <label>Comment:</label><br>
            <textarea name="comment" rows="5" class="input-field" required></textarea><br><br>

            <button type="submit" class="button">Submit Comment</button>

        </form>

    </div>

</body>
</html>
