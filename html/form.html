<!DOCTYPE html>
<html>
    <head>
        <title>Forms in HTML</title>
    </head>
    <body>
        <h1>Form</h1>
        <form>
            <label for="name">Enter name:</label>
            <input type="text" id="name" name="name" placeholder="Enter your name"><br/><br/>
            <label for="email">Enter email:</label>
            <input type="email" id="email" name="email" placeholder="Enter your email"><br/><br/>
            <label for="phone">Enter phone:</label>
            <input type="tel" id="phone" name="phone" placeholder="Enter your phone"><br/><br/>
            <label for="password">Enter password:</label>
            <input type="password" id="password" name="password" placeholder="..."><br/><br/>
            <label for="qualification">Select qualification</label>
            <select id="qualification" name="qualification" >
                <option value="High School">High School</option>
                <option value="Higher Secondary">Higher Secondary</option>
                <option value="UG">UG</option>
                <option value="PG">PG</option>
            </select><br/><br/>
            <label for="gender">Select gender</label>
            <input type="radio" id="male" name="male" value="male">
            <label for="male">Male</label>
            <input type="radio" id="female" name="female" value="female">
            <label for="female">Female</label>
            <input type="radio" id="other" name="other" value="other">
            <label for="other">Other</label><br/><br/>
            <label for="message">Message</label>
            <textarea id="message" name="message" rows="10" cols="30" placeholder="Enter your message">
            </textarea><br><br>
            <label for="dob">Date of birth:</label>
            <input type="date" id="dob" name="dob" value="dob" placeholder="dd-mm-yyyy"><br><br>
            <label for="resume">Upload a resume:</label>
            <input type="file" id="resume" name="resume"><br><br> 
            <label for="color">Choose your favorite color:</label>
            <input type="color" id="color" name="color" value="#ff0000"><br><br>
            <label for="newsletter">Subscribe to newsletter:</label>
            <input type="checkbox" id="newsletter" name="newsletter">
            <input type="reset" value="Reset">
            <input type="submit" value="Submit">
        </form>
    </body>
</html>
