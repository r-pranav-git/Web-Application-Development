<!DOCTYPE html>
<html>
<head>
    <title>Forms in HTML</title>
</head>
<body>
    <h1>Form</h1>
    <form>
        <label>Enter name:</label>
        <input type="text" name="name" placeholder="Enter your name"><br><br>

        <label>Enter email:</label>
        <input type="email" name="email" placeholder="Enter your email"><br><br>

        <label>Enter phone:</label>
        <input type="tel" name="phone" placeholder="Enter your phone"><br><br>

        <label>Enter password:</label>
        <input type="password" name="password"><br><br>

        <label>Select qualification:</label>
        <select name="qualification">
            <option>High School</option>
            <option>Higher Secondary</option>
            <option>UG</option>
            <option>PG</option>
        </select><br><br>

        <label>Select gender:</label>
        <input type="radio" name="gender" value="male"> Male
        <input type="radio" name="gender" value="female"> Female
        <input type="radio" name="gender" value="other"> Other<br><br>

        <label>Message:</label><br>
        <textarea rows="5" cols="30" placeholder="Enter your message"></textarea><br><br>

        <label>Date of birth:</label>
        <input type="date"><br><br>

        <label>Upload a resume:</label>
        <input type="file"><br><br>

        <label>Choose your favorite color:</label>
        <input type="color" value="#ff0000"><br><br>

        <label>Subscribe to newsletter:</label>
        <input type="checkbox"><br><br>

        <input type="reset">
        <input type="submit">
    </form>
</body>
</html>
